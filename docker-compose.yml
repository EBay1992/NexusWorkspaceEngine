services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: orbit
      POSTGRES_PASSWORD: orbit
      POSTGRES_DB: orbit
    ports:
      - "5432:5432"
    volumes:
      - orbit_pg_data:/var/lib/postgresql/data
      - ./services/gateway/Sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./services/gateway/Sql/seed-dev.sql:/docker-entrypoint-initdb.d/02-seed-dev.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbit -d orbit"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    ports:
      - "5080:5080"
    environment:
      DATABASE_URL: postgresql://orbit:orbit@postgres:5432/orbit
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:-dev-signing-key-32-bytes-minimum!!}
      RELAY_WS_URL: ${RELAY_WS_URL:-ws://localhost:1234/orbit}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      ASPNETCORE_URLS: http://0.0.0.0:5080
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  relay:
    build:
      context: .
      dockerfile: apps/relay/Dockerfile
    ports:
      - "1234:1234"
    environment:
      NODE_ENV: production
      RELAY_HOST: 0.0.0.0
      RELAY_PORT: 1234
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:-dev-signing-key-32-bytes-minimum!!}
      RELAY_DEV_NO_AUTH: ${RELAY_DEV_NO_AUTH:-false}
      RELAY_REDIS_ENABLED: ${RELAY_REDIS_ENABLED:-false}
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:1234/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_GATEWAY_URL: ${NEXT_PUBLIC_GATEWAY_URL:-http://localhost:5080}
        NEXT_PUBLIC_RELAY_WS_URL: ${NEXT_PUBLIC_RELAY_WS_URL:-ws://localhost:1234/orbit}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    depends_on:
      gateway:
        condition: service_healthy
      relay:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  orbit_pg_data:
