name: Deploy

# Manual deploy template for Render / Fly.io. Configure repository secrets before use.
on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

jobs:
  build:
    name: Build production images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build relay
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/relay/Dockerfile
          push: false
          tags: orbit-relay:${{ github.sha }}

      - name: Build gateway
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/gateway/Dockerfile
          push: false
          tags: orbit-gateway:${{ github.sha }}

      - name: Build web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          tags: orbit-web:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_GATEWAY_URL=${{ secrets.NEXT_PUBLIC_GATEWAY_URL }}
            NEXT_PUBLIC_RELAY_WS_URL=${{ secrets.NEXT_PUBLIC_RELAY_WS_URL }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}

  deploy-render:
    name: Deploy to Render (template)
    runs-on: ubuntu-latest
    needs: build
    if: false # Enable after configuring RENDER_API_KEY and service IDs
    steps:
      - name: Deploy placeholder
        run: |
          echo "Configure Render deploy hook or API deploy step here."
          echo "Required secrets: RENDER_API_KEY, RENDER_SERVICE_ID_WEB, RENDER_SERVICE_ID_RELAY, RENDER_SERVICE_ID_GATEWAY"

  deploy-fly:
    name: Deploy to Fly.io (template)
    runs-on: ubuntu-latest
    needs: build
    if: false # Enable after configuring FLY_API_TOKEN
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy placeholder
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          echo "Add flyctl deploy steps per service (relay, gateway, web)."
          echo "Set memory limits: relay 256MB, gateway 256MB, web 512MB."
