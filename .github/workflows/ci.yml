name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-typescript:
    name: TypeScript tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint TypeScript packages
        run: pnpm -r lint

      - name: Run TypeScript tests
        run: pnpm -r test

  test-gateway:
    name: Gateway tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Run gateway tests
        working-directory: services/gateway
        run: dotnet test Orbit.Gateway.sln --configuration Release

  docker-build:
    name: Docker images
    runs-on: ubuntu-latest
    needs: [test-typescript, test-gateway]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build relay image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/relay/Dockerfile
          push: false
          tags: orbit-relay:ci

      - name: Build gateway image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/gateway/Dockerfile
          push: false
          tags: orbit-gateway:ci

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          tags: orbit-web:ci
          build-args: |
            NEXT_PUBLIC_GATEWAY_URL=http://localhost:5080
            NEXT_PUBLIC_RELAY_WS_URL=ws://localhost:1234/orbit
            NEXT_PUBLIC_APP_URL=http://localhost:3000
